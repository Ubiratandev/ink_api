<!DOCTYPE html>
<html>
<head>
    <title>Ink IA</title>
</head>
<body>
   <div class="objetivo">
    <h2>objetivo da postagem</h2>
    <select value = "Objetivo da postagem:" onchange={}>
    <optgroup>
        <option value = "0"> "aparecer para novos seguideores"</option>
        <option value = "1">"engajar com pessoas que ja viram as suas postagens"</option>
        <option value = "2">"vender para pessoas que ja engajaram com voce"</option>   
    </optgroup>
   </select>
   </div>

   <div class="tipo_tatuagem">


    <h2>tipo de tatuagem</h2>
    <select value = "tipo de tatuagem" onchange={}>
    <optgroup>
        <option value = "0"> "tatuagem nova"</option>
        <option value = "1">"cobertura"</option>
        <option value = "2">"reforma"</option>   
    </optgroup>
   </select>
   </div>


   
   <div class="estilo da tatuagem">


    <h2>estilo da tatuagem</h2>
    <select value = "estilo da tatuagem" onchange={}>
    <optgroup>
        <option value = "0"> "fine line"</option>
        <option value = "1">"realismo preto e cinza"</option>
        <option value = "2">"realismo colorido"</option> 
        <option value = "3">"neotradicional"</option>   
  
    </optgroup>
   </select>
   </div>


</body>
</html>
